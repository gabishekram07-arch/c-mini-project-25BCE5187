<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>🎬 Movie Ticket System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
        #output { 
            width: 90%; max-width: 800px; height: 450px; background: #000; color: #33ff33; 
            font-family: 'Consolas', 'Courier New', monospace; padding: 15px; border: 2px solid #444;
            margin-top: 20px; border-radius: 8px; overflow-y: auto; white-space: pre-wrap;
            text-align: left; margin-left: auto; margin-right: auto;
        }
        .input-area { background: #333; padding: 20px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 250px; border: 1px solid #555; border-radius: 4px; background: #222; color: white; outline: none; }
        input:focus { border-color: #eb3b5a; }
        button { padding: 12px 25px; background: #eb3b5a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff4d6d; }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>🎬 Movie Ticket System</h1>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type choice and press Enter..." autofocus>
        <button onclick="sendCommand()">Send</button>
    </div>

    <div id="output">Initializing system...&#10;</div>
    <canvas id="canvas"></canvas>

    <script type='text/javascript'>
        var inputQueue = [];
        var outputElement = document.getElementById('output');

        function sendCommand() {
            var inputField = document.getElementById('userInput');
            var val = inputField.value;
            if (val === "") return;
            
            // Append newline so C's fgets/scanf knows the line ended
            val += "\n"; 
            for (var i = 0; i < val.length; i++) {
                inputQueue.push(val.charCodeAt(i));
            }
            
            // Mirror the user input to the "terminal"
            outputElement.innerText += "> " + inputField.value + "\n";
            inputField.value = "";
            outputElement.scrollTop = outputElement.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendCommand();
        });

        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    outputElement.innerText += text + "\n";
                    outputElement.scrollTop = outputElement.scrollHeight;
                };
            })(),
            canvas: document.getElementById('canvas'),
            stdin: function() {
                if (inputQueue.length > 0) {
                    return inputQueue.shift();
                }
                return undefined;
            }
        };
    </script>
    <script async src="index.js"></script>
</body>
</html>
