<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Movie Ticket System</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
        #output { 
            width: 90%; height: 400px; background: #000; color: #33ff33; 
            font-family: 'Courier New', monospace; padding: 10px; border: 2px solid #444;
            margin-top: 15px; resize: none;
        }
        .input-area { background: #333; padding: 15px; border-radius: 8px; display: inline-block; }
        input { padding: 10px; width: 250px; border: none; border-radius: 4px; }
        button { padding: 10px 20px; background: #eb3b5a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>🎬 Movie Ticket System</h1>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type choice and press Enter...">
        <button onclick="sendCommand()">Send</button>
    </div>

    <br>
    <textarea id="output" readonly></textarea>
    <canvas id="canvas"></canvas>

    <script type='text/javascript'>
        var inputQueue = []; // The "bridge" queue

        function sendCommand() {
            var inputField = document.getElementById('userInput');
            if (!inputField.value) return;
            
            // Add a newline so scanf() knows the input is finished
            var val = inputField.value + "\n"; 
            for (var i = 0; i < val.length; i++) {
                inputQueue.push(val.charCodeAt(i));
            }
            inputField.value = ""; 
        }

        // Shortcut: Pressing Enter sends the command
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendCommand();
        });

        var Module = {
            print: function(text) {
                var element = document.getElementById('output');
                if (element) {
                    element.value += text + "\n";
                    element.scrollTop = element.scrollHeight;
                }
            },
            stdin: function() {
                // C calls this function whenever it runs scanf()
                if (inputQueue.length > 0) {
                    return inputQueue.shift();
                }
                return null; // Signals "No Input" to C
            },
            canvas: document.getElementById('canvas')
        };
    </script>
    <script async src="index.js"></script>
</body>
</html>
