<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Movie Ticket System</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        #output { width: 80%; height: 300px; background: black; color: #0f0; font-family: monospace; margin-top: 10px; }
        .controls { margin: 20px; }
        input { padding: 8px; width: 200px; }
        button { padding: 8px 16px; cursor: pointer; }
        canvas { display: none; } /* Hide the canvas since we only need text */
    </style>
</head>
<body>
    <h1>Movie Ticket System</h1>
    
    <div class="controls">
        <input type="text" id="userInput" placeholder="Type choice (e.g., 1) and press Enter">
        <button onclick="sendCommand()">Send</button>
    </div>

    <textarea id="output" readonly></textarea>
    <canvas id="canvas"></canvas>

    <script type='text/javascript'>
        var inputQueue = [];

        function sendCommand() {
            var inputField = document.getElementById('userInput');
            var val = inputField.value + "\n"; 
            for (var i = 0; i < val.length; i++) {
                inputQueue.push(val.charCodeAt(i));
            }
            inputField.value = ""; 
        }

        // Allow pressing "Enter" key to send
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendCommand();
        });

        var Module = {
            print: function(text) {
                var element = document.getElementById('output');
                if (element) {
                    element.value += text + "\n";
                    element.scrollTop = element.scrollHeight;
                }
            },
            stdin: function() {
                if (inputQueue.length > 0) {
                    return inputQueue.shift();
                }
                return null; 
            },
            canvas: document.getElementById('canvas')
        };
    </script>
    <script async src="index.js"></script>
</body>
</html>
